<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuro-RHR Optimization Protocol</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0B0C10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Neuro-RHR">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#050507',
                        glass: 'rgba(20, 25, 30, 0.45)',
                        cyan: { 400: '#45F3FF', 500: '#00E5FF' },
                        red: { 500: '#FF2A2A' },
                        green: { 400: '#39FF14' },
                        yellow: { 400: '#FFEA00' }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body { 
            background-color: #050507; 
            background-image: radial-gradient(circle at 50% 0%, #111822 0%, #050507 70%);
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            min-height: 100vh;
        }
        /* Enhanced Glass-morphism */
        .glass-panel { 
            background: rgba(15, 20, 25, 0.4); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 229, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };
            return [storedValue, setValue];
        };

        const SCHEDULE = [
            { day: 'Sun', type: 'Easy Cardio', desc: 'Zone 2, 110-130 BPM', color: 'text-cyan-400' },
            { day: 'Mon', type: 'Hard Endurance', desc: '30m+ in Zone 4/5', color: 'text-red-500' },
            { day: 'Tue', type: 'Easy Cardio', desc: 'Zone 2, 110-130 BPM', color: 'text-cyan-400' },
            { day: 'Wed', type: 'Strength', desc: 'Lower Body / Legs', color: 'text-purple-400' },
            { day: 'Thu', type: 'Strength', desc: 'Upper Body', color: 'text-purple-400' },
            { day: 'Fri', type: 'HIIT', desc: '100m/400m sprints or hill repeats', color: 'text-red-500' },
            { day: 'Sat', type: 'Shabbat Rest', desc: 'Full Recovery', color: 'text-gray-400' }
        ];

        const calculateVolumeRatchet = (baseVolume, weekNumber) => {
            const cycle = Math.floor((weekNumber - 1) / 3);
            const weekInCycle = (weekNumber - 1) % 3;
            let currentBaseline = baseVolume * Math.pow(1.1, cycle);
            
            if (weekInCycle === 0) return currentBaseline;
            if (weekInCycle === 1) return currentBaseline * 1.1;
            return (currentBaseline * 1.1) * 0.5;
        };

        const App = () => {
            const [currentWeek, setCurrentWeek] = useLocalStorage('rhr_currentWeek', 1);
            const [baseVolume] = useLocalStorage('rhr_baseVolume', 60);
            const [completedDays, setCompletedDays] = useLocalStorage('rhr_completedDays', {});
            const [dailyRecovery, setDailyRecovery] = useLocalStorage('rhr_dailyRecovery', {});
            const [checklist, setChecklist] = useLocalStorage('rhr_checklist', { sunlight: false, water: false, fast: false, nasal: false });
            
            const [currentDayIndex, setCurrentDayIndex] = useState(new Date().getDay());
            const [showPraise, setShowPraise] = useState(false);

            const activeVolume = calculateVolumeRatchet(baseVolume, currentWeek);
            const phase = (currentWeek - 1) % 3 === 0 ? 'Baseline' : (currentWeek - 1) % 3 === 1 ? 'Push (+10%)' : 'De-load (-50%)';
            const todayWorkout = SCHEDULE[currentDayIndex];
            const todayKey = `w${currentWeek}-d${currentDayIndex}`;
            const isCompleted = !!completedDays[todayKey];
            const currentRecovery = dailyRecovery[todayKey] || null;

            // Derived Data: Tomorrow's Forecast
            const tomorrowIndex = (currentDayIndex + 1) % 7;
            const tomorrowWeek = currentDayIndex === 6 ? currentWeek + 1 : currentWeek;
            const tomorrowWorkout = SCHEDULE[tomorrowIndex];
            const tomorrowVolume = calculateVolumeRatchet(baseVolume, Math.min(tomorrowWeek, 12));

            // Derived Data: Streak & Sparkline Engine
            const { streak, sparkline } = useMemo(() => {
                let currentStreak = 0;
                let w = currentWeek;
                let d = currentDayIndex;
                
                let tempSparkline = [];
                let tempW = currentWeek;
                let tempD = currentDayIndex;
                for(let i=0; i<7; i++) {
                    tempSparkline.unshift({ 
                        completed: !!completedDays[`w${tempW}-d${tempD}`], 
                        isToday: i === 0 
                    });
                    tempD--;
                    if (tempD < 0 && tempW > 1) { tempD = 6; tempW--; }
                    else if (tempD < 0) { tempD = 0; } 
                }

                if (completedDays[`w${w}-d${d}`]) currentStreak++;
                d--;
                if (d < 0) { d = 6; w--; }

                while (w > 0) {
                    if (completedDays[`w${w}-d${d}`]) {
                        currentStreak++;
                        d--;
                        if (d < 0) { d = 6; w--; }
                    } else {
                        break;
                    }
                }
                return { streak: currentStreak, sparkline: tempSparkline };
            }, [completedDays, currentWeek, currentDayIndex]);

            let suggestedAdjustment = null;
            if (currentRecovery === 'Red' && (todayWorkout.type === 'Hard Endurance' || todayWorkout.type === 'HIIT')) {
                suggestedAdjustment = "Shift to Light Breathwork or 20m Mobility (Recovery overridden).";
            } else if (currentRecovery === 'Yellow' && todayWorkout.type === 'Hard Endurance') {
                suggestedAdjustment = "Cap Zone 4 at 15m max. Focus on form over output.";
            }

            const handleComplete = () => {
                setCompletedDays(prev => ({ ...prev, [todayKey]: true }));
                setShowPraise(true);
                setTimeout(() => setShowPraise(false), 4500);
            };

            const toggleChecklist = (key) => setChecklist(prev => ({ ...prev, [key]: !prev[key] }));

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center max-w-lg mx-auto">
                    
                    <header className="w-full mb-8 mt-4">
                        <div className="flex justify-between items-end mb-2">
                            <h1 className="text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 uppercase">
                                Neuro-RHR
                            </h1>
                            <div className="text-right">
                                <span className="text-xs text-cyan-500 font-mono tracking-widest uppercase block mb-1">Neural Continuity</span>
                                <span className="text-xl font-bold">{streak} <span className="text-sm text-gray-500">Days</span></span>
                            </div>
                        </div>

                        <div className="flex justify-between text-xs text-gray-400 mb-2 uppercase tracking-widest mt-4">
                            <span>Hebbian Wiring</span>
                            <span>Week {currentWeek} / 12 ({phase})</span>
                        </div>
                        
                        <div className="w-full bg-gray-900 rounded-full h-1.5 border border-gray-800 overflow-hidden relative mb-4">
                            <motion.div 
                                className="bg-cyan-500 h-full rounded-full shadow-[0_0_10px_#00E5FF]"
                                initial={{ width: 0 }}
                                animate={{ width: `${(currentWeek / 12) * 100}%` }}
                                transition={{ duration: 1, ease: "easeOut" }}
                            />
                        </div>

                        <div className="flex space-x-1.5 h-1.5 w-full">
                            {sparkline.map((day, i) => (
                                <div key={i} className={`flex-1 rounded-full ${day.completed ? 'bg-cyan-400 shadow-[0_0_8px_rgba(0,229,255,0.6)]' : 'bg-gray-800'} ${day.isToday && !day.completed ? 'animate-pulse bg-gray-600' : ''}`} />
                            ))}
                        </div>
                    </header>

                    <section className="w-full glass-panel rounded-xl p-5 mb-6">
                        <h2 className="text-xs font-bold text-gray-400 mb-4 uppercase tracking-widest border-b border-gray-800/50 pb-2">Bio-Optimization Targets</h2>
                        <div className="grid grid-cols-2 gap-4 text-sm">
                            {[
                                { id: 'sunlight', label: 'Morning Sunlight 15m' },
                                { id: 'water', label: '3L Hydration' },
                                { id: 'fast', label: '4hr Pre-Sleep Fast' },
                                { id: 'nasal', label: 'Nasal Breathing Only' }
                            ].map(item => (
                                <label key={item.id} className="flex items-center space-x-3 cursor-pointer group">
                                    <div className={`w-5 h-5 rounded border flex items-center justify-center transition-colors ${checklist[item.id] ? 'bg-cyan-500 border-cyan-500' : 'border-gray-600 group-hover:border-cyan-500'}`}>
                                        {checklist[item.id] && <span className="text-black text-xs font-bold">✓</span>}
                                    </div>
                                    <input type="checkbox" className="hidden" onChange={() => toggleChecklist(item.id)} />
                                    <span className={`transition-colors ${checklist[item.id] ? 'text-gray-200' : 'text-gray-500 group-hover:text-gray-300'}`}>{item.label}</span>
                                </label>
                            ))}
                        </div>
                    </section>

                    <motion.section 
                        className={`w-full glass-panel rounded-2xl p-6 relative overflow-hidden transition-all duration-500 ${suggestedAdjustment ? 'border-yellow-500/30 bg-yellow-500/5' : ''}`}
                        initial={{ y: 20, opacity: 0 }}
                        animate={{ y: 0, opacity: 1 }}
                    >
                        <div className="absolute top-0 right-0 p-4 opacity-[0.03] text-8xl font-black pointer-events-none">
                            {todayWorkout.day}
                        </div>
                        <h2 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Current Session</h2>
                        <h3 className={`text-3xl font-bold mb-2 tracking-tight ${todayWorkout.color}`}>{todayWorkout.type}</h3>
                        <p className="text-gray-300 mb-6 font-medium">{todayWorkout.desc}</p>
                        
                        <div className="bg-black/40 p-4 rounded-xl border border-gray-800/50 inline-block mb-6 shadow-inner">
                            <span className="text-xs text-gray-500 uppercase block mb-1 font-bold tracking-wider">Target Volume</span>
                            <span className="text-2xl font-mono text-cyan-400">{Math.round(activeVolume)} <span className="text-sm text-gray-500 uppercase">Mins</span></span>
                        </div>

                        {suggestedAdjustment && (
                            <div className="mb-6 p-4 bg-yellow-500/10 border border-yellow-500/30 rounded-xl text-yellow-400 text-sm font-medium leading-relaxed">
                                <span className="block mb-1 text-xs uppercase tracking-widest text-yellow-500">System Override Active</span>
                                {suggestedAdjustment}
                            </div>
                        )}

                        <button 
                            onClick={handleComplete}
                            disabled={isCompleted}
                            className={`w-full py-4 rounded-xl font-bold tracking-widest uppercase transition-all duration-300 relative overflow-hidden ${
                                isCompleted 
                                ? 'bg-green-500/10 text-green-500 border border-green-500/30 cursor-not-allowed'
                                : 'bg-cyan-500 text-obsidian hover:bg-cyan-400 shadow-[0_0_20px_rgba(0,229,255,0.3)] hover:shadow-[0_0_35px_rgba(0,229,255,0.5)]'
                            }`}
                        >
                            {isCompleted ? 'Session Integrated ✓' : 'Complete Session'}
                        </button>
                    </motion.section>

                    {/* Tomorrow's Forecast (Mental Priming) */}
                    <section className="w-full mt-4 glass-panel rounded-xl p-4 border-dashed border-gray-700/50 opacity-80 hover:opacity-100 transition-opacity">
                        <div className="flex justify-between items-center">
                            <div className="flex-1 pr-4">
                                <h4 className="text-[10px] text-gray-500 uppercase tracking-widest font-bold mb-1">Up Next ({tomorrowWorkout.day})</h4>
                                <span className={`text-sm font-bold block ${tomorrowWorkout.color}`}>{tomorrowWorkout.type}</span>
                                <span className="text-xs text-gray-400 mt-0.5 block font-medium">{tomorrowWorkout.desc}</span>
                            </div>
                            <div className="text-right pl-4 border-l border-gray-800/50">
                                <span className="text-[10px] text-gray-500 uppercase tracking-widest font-bold mb-1 block">Forecast</span>
                                <span className="text-sm font-mono text-cyan-500/80">{Math.round(tomorrowVolume)}m</span>
                            </div>
                        </div>
                    </section>

                    <AnimatePresence>
                        {showPraise && (
                            <motion.div 
                                initial={{ opacity: 0, y: 50, scale: 0.95 }}
                                animate={{ opacity: 1, y: 0, scale: 1 }}
                                exit={{ opacity: 0, y: 20, opacity: 0 }}
                                className="fixed bottom-8 left-4 right-4 md:left-auto md:right-auto md:w-[26rem] glass-panel bg-obsidian/95 border-cyan-500/50 p-5 rounded-xl shadow-[0_10px_40px_rgba(0,229,255,0.2)] z-50 backdrop-blur-xl"
                            >
                                <h4 className="text-cyan-400 font-bold mb-2 flex items-center text-sm uppercase tracking-widest">
                                    <span className="mr-2 text-lg">⚡</span> Structural Integrity Reinforced
                                </h4>
                                <p className="text-sm text-gray-200 leading-relaxed font-medium">
                                    {phase.includes('De-load') 
                                        ? "Systemic recovery initiated: Supercompensation is mathematically inevitable." 
                                        : "Neural pathways forged: Consistency is the architect of physiological change."}
                                </p>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
